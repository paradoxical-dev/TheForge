# INFO: Sources all external configs and execs necessary tools

#---------------tells dbus about the current desktop
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland
# INFO: openrc will ignore systemd flag. command will still work
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

#---------------kills all existing desktop portals; starts hyprlands
exec-once = ~/.config/hypr/xdg-portal-hyprland

#---------------starts polkit agent
exec-once = /usr/libexec/hyprpolkitagent

#---------------starts pipewire
exec-once = /usr/bin/gentoo-pipewire-launcher restart &

#---------------starts awww
exec-once = awww-daemon

#---------------starts hypridle
exec-once = hypridle

#---------------starts swaync
# exec-once = swaync

#---------------starts waybar
# exec-once = waybar

#---------------source configs
source = ~/.config/hypr/modules/env.conf
source = ~/.config/hypr/modules/apps.conf
source = ~/.config/hypr/modules/inputs.conf
source = ~/.config/hypr/modules/keybinds.conf
source = ~/.config/hypr/modules/windowrules.conf
source = ~/.config/hypr/modules/monitors.conf
source = ~/.config/hypr/modules/general.conf
